[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

board_build.f_cpu = 600000000L

build_flags =
    -D USB_MIDI_SERIAL
    -D TEENSY_OPT_FASTER

; Rely on the Audio, SPI, SD, Wire, MIDI libraries that ship with the Teensy core.
; Do NOT pull newer Audio from GitHub — that's what's causing the version mismatch.
lib_deps =
    PaulStoffregen/ILI9341_t3
    PaulStoffregen/XPT2046_Touchscreen

lib_ldf_mode = deep+
monitor_speed = 115200
